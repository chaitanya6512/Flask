<!-- It will contain a form to collect Name, Email, City, Country, and Phone.-->
<!-- Use the POST method to submit the data, then insert it into the database and commit the changes.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask and SQLite</title>
</head>
<body>
    <form method="POST">

        <label>Enter Name:</label>
        <input type="name" name="name" placeholder="Enter your name" required>
    </br>
        <label>Enter Email:</label>
        <input type="email" name="email" placeholder="Enter your email" required>
    </br>
        <label>Enter City:</label>
        <input type="name" name="city" placeholder="Enter your City name" required>
    </br>
        <label>Enter Country:</label>
        <input type="name" name="country" placeholder="Enter the Country name" required>
    </br>
        <label>Enter Phone num:</label>
        <input type="name" name="phone" placeholder="Your phone number" required>
    </br>
        <input type="submit" value="submit"/>
    </br>
    </form>
</body>
</html>
